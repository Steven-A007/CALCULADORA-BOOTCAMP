<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Científica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="calculator">
  <div class="top-row">
    <button class="mode-toggle" id="angleMode" title="Cambiar entre grados y radianes">DEG</button>
  </div>

  <div class="display">
    <div class="expr-line" id="exprLine">&nbsp;</div>
    <div class="result-line" id="resultLine">0</div>
  </div>

  <div class="pad" id="pad">
    <button class="key k-shift" id="shiftKey" data-action="shift">2nd</button>
    <button class="key k-op" data-action="paren-open">(</button>
    <button class="key k-op" data-action="paren-close">)</button>
    <button class="key k-op" data-action="factorial">x!</button>
    <button class="key k-op" data-action="clear">C</button>

    <button class="key k-func" data-action="func" data-value="sin" data-alt="asin">
      sin<span class="corner">sin⁻¹</span>
    </button>
    <button class="key k-func" data-action="func" data-value="cos" data-alt="acos">
      cos<span class="corner">cos⁻¹</span>
    </button>
    <button class="key k-func" data-action="func" data-value="tan" data-alt="atan">
      tan<span class="corner">tan⁻¹</span>
    </button>
    <button class="key k-op" data-action="power">x^y</button>
    <button class="key k-op" data-action="sqrt">√</button>

    <button class="key k-func" data-action="func" data-value="ln" data-alt="exp">
      ln<span class="corner">eˣ</span>
    </button>
    <button class="key k-func" data-action="func" data-value="log" data-alt="pow10">
      log<span class="corner">10ˣ</span>
    </button>
    <button class="key k-op" data-action="const" data-value="π">π</button>
    <button class="key k-op" data-action="const" data-value="e">e</button>
    <button class="key k-op" data-action="mod">mod</button>

    <button class="key k-num" data-action="digit" data-value="7">7</button>
    <button class="key k-num" data-action="digit" data-value="8">8</button>
    <button class="key k-num" data-action="digit" data-value="9">9</button>
    <button class="key k-op" data-action="op" data-value="÷">÷</button>
    <button class="key k-op" data-action="backspace">⌫</button>

    <button class="key k-num" data-action="digit" data-value="4">4</button>
    <button class="key k-num" data-action="digit" data-value="5">5</button>
    <button class="key k-num" data-action="digit" data-value="6">6</button>
    <button class="key k-op" data-action="op" data-value="×">×</button>
    <button class="key k-op" data-action="square">x²</button>

    <button class="key k-num" data-action="digit" data-value="1">1</button>
    <button class="key k-num" data-action="digit" data-value="2">2</button>
    <button class="key k-num" data-action="digit" data-value="3">3</button>
    <button class="key k-op" data-action="op" data-value="−">−</button>
    <button class="key k-op" data-action="reciprocal">1/x</button>

    <button class="key k-num" data-action="digit" data-value="0">0</button>
    <button class="key k-num" data-action="dot">.</button>
    <button class="key k-op" data-action="sign">±</button>
    <button class="key k-op" data-action="op" data-value="+">+</button>
    <button class="key k-equal" data-action="equals">=</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
